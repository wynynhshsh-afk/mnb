<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود تلگرام - Self Nexo</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        .info {
            background: #eef;
            padding: 1rem;
            border-radius: 5px;
            margin: 1rem 0;
        }
        button {
            padding: 0.75rem 2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.5rem;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 ورود با تلگرام</h1>
        <div class="info">
            <p>سلام <b>{{ username }}</b>!</p>
            <p>برای ادامه، باید با حساب تلگرام خود وارد شوید.</p>
        </div>
        <button onclick="startLogin()">🔐 شروع ورود</button>
        <br>
        <button onclick="window.location.href='/'">🔙 بازگشت</button>
    </div>
    
    <script>
        function startLogin() {
            alert('در حال انتقال به فرآیند ورود تلگرام...');
            // اینجا باید API call به backend زده شود
        }
    </script>
</body>
</html>
